name: Build

on: push

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      artifact_name: ${{ steps.generate_name.outputs.artifact_name }}
      version: ${{ steps.get_version.outputs.version }}
    env:
      PEBBLE_SKIP_ANALYTICS: 1
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Get version
        id: get_version
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Cache date
        run: echo "DATE=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV

      - name: Filename friendly date
        run: echo "BUILD_DATE=$(echo $DATE | sed -r -e 's/:/./g' -e 's/ /_/g')" >> $GITHUB_ENV

      - name: Store branch name
        run: echo "BUILD_BRANCH=${GITHUB_REF##*/}" >> $GITHUB_ENV

      - name: Store commit hash
        run: echo "BUILD_COMMIT=$(git rev-parse --short $GITHUB_SHA)" >> $GITHUB_ENV

      - name: Generate output name
        id: generate_name
        run: |
          NAME="${BUILD_DATE}_${BUILD_BRANCH}_${BUILD_COMMIT}_Pebble-Casio-WV58DE"
          echo "NAME=$NAME" >> $GITHUB_ENV
          echo "artifact_name=$NAME" >> $GITHUB_OUTPUT

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y libnode-dev npm
          sudo apt install -y libsdl1.2debian libfdt1 libpixman-1-0
          sudo apt install -y xvfb
          python3 -m pip install pebble-tool

      - name: Install Pebble SDK
        run: pebble sdk install latest

      - name: Build app
        run: pebble build

      - name: Generate screenshots (release only)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          ./scripts/gen_screenshots.sh
          cp build/basalt.png build/screenshot.png

      - name: Upload app
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.NAME }}
          path: |
            build/*.pbw
            build/*.png

  release:
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download files
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}

      - name: Create zip
        run: |
          FOLDER_NAME="Pebble-Casio-WV58DE-${{ needs.build.outputs.version }}"
          mkdir -p "$FOLDER_NAME"
          cp *.pbw *.png "$FOLDER_NAME/"
          zip -r release.zip "$FOLDER_NAME/"

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.pbw
            screenshot.png
            release.zip
